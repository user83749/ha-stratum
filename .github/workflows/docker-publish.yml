name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Use GHCR_TOKEN if you set it (classic PAT with write:packages), otherwise fall back to GITHUB_TOKEN.
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Get version
        id: version
        run: |
          # Use the git tag if triggered by a tag push (preferred release flow)
          # Fall back to config.yaml for pushes to main / workflow_dispatch runs
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="$(echo "${{ github.ref_name }}" | sed 's/^v//')"
          else
            VERSION="$(grep '^version:' config.yaml | cut -d' ' -f2 | tr -d '\"')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base-nodejs:0.2.5
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-stratum-amd64:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-amd64:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-amd64:latest

      - name: Verify push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/ha-stratum-amd64:${{ steps.version.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            if docker pull "$IMAGE"; then
              echo "✅ Image verified: $IMAGE"
              exit 0
            fi
            echo "Pull failed (attempt $i/6). Waiting 10s..."
            sleep 10
          done
          echo "❌ Failed to verify image after retries: $IMAGE"
          exit 1

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="$(echo "${{ github.ref_name }}" | sed 's/^v//')"
          else
            VERSION="$(grep '^version:' config.yaml | cut -d' ' -f2 | tr -d '\"')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push (aarch64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base-nodejs:0.2.5
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-stratum-aarch64:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-aarch64:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-aarch64:latest

      - name: Verify push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/ha-stratum-aarch64:${{ steps.version.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            if docker pull "$IMAGE"; then
              echo "✅ Image verified: $IMAGE"
              exit 0
            fi
            echo "Pull failed (attempt $i/6). Waiting 10s..."
            sleep 10
          done
          echo "❌ Failed to verify image after retries: $IMAGE"
          exit 1
