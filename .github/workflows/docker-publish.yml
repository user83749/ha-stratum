name: Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/hassio-addons/base-nodejs:0.2.5
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/hassio-addons/base-nodejs:0.2.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          # Use the git tag if triggered by a tag push (preferred release flow)
          # Fall back to config.yaml for pushes to main / workflow_dispatch runs
          if [[ "${{ github.ref_name }}" =~ ^v[0-9] ]]; then
            VERSION="$(echo "${{ github.ref_name }}" | sed 's/^v//')"
          else
            VERSION="$(grep '^version:' config.yaml | cut -d' ' -f2 | tr -d '\"')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          attestations: false
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-stratum-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-${{ matrix.arch }}:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-stratum-${{ matrix.arch }}:latest

      - name: Verify push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/ha-stratum-${{ matrix.arch }}:${{ steps.version.outputs.version }}"
          for i in 1 2 3 4 5 6; do
            if docker pull "$IMAGE"; then
              echo "✅ Image verified: $IMAGE"
              exit 0
            fi
            echo "Pull failed (attempt $i/6). Waiting 10s..."
            sleep 10
          done
          echo "❌ Failed to verify image after retries: $IMAGE"
          exit 1
